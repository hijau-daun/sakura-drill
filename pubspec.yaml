name: sakura_drill
description: "A gamified Japanese learning app - Learn Japanese one petal at a time."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management & Logic
  flutter_bloc: ^9.0.0
  equatable: ^2.0.7
  fpdart: ^1.1.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  
  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.4.2

  # Navigation
  go_router: ^14.0.0

  # UI & Styling
  google_fonts: ^6.0.0
  flutter_svg: ^2.0.10+1

  # Networking
  dio: ^5.8.0+1
  pretty_dio_logger: ^1.4.0

  # Database & Auth
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  injectable_generator: ^2.6.1
  hive_generator: ^2.0.1

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
